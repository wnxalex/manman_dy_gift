name: Build Windows EXE

# 推送到 master 分支时自动触发；也可在 Actions 页手动 Run
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 签名算法运行需要 jsrsasign，用 package.json 重新装
      - name: Install JS deps (jsrsasign)
        shell: bash
        run: npm install --no-audit --no-fund

      - name: Install Python deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --onefile --name GiftDJ \
            --add-data "static;static" \
            --add-data "node_modules;node_modules" \
            --add-data "webui;webui" \
            --hidden-import pygame \
            --hidden-import websocket \
            --hidden-import static.Live_pb2 \
            --hidden-import static.Response_pb2 \
            --hidden-import dy_apis.douyin_api \
            --hidden-import builder.auth \
            gift_dj.py

      - name: Assemble dist (bundle node.exe + blank config + folders)
        shell: bash
        run: |
          # 附带 node.exe 运行时（抖音签名算法要靠它执行 JS）
          NODE_DIR="$(dirname "$(command -v node)")"
          cp "$NODE_DIR/node.exe" dist/ 2>/dev/null || cp "$(command -v node)" dist/ || true
          # 生成干净的空白 config.json（绝不打包任何人的 cookie）
          python -c "import json; open('dist/config.json','w',encoding='utf-8').write(json.dumps({'live_id':'','cookie':'','gift_songs':{},'bgm_list':[],'bgm_enabled':True,'bgm_shuffle':False,'combo_window_seconds':8,'max_queue':5,'volume':0.9,'bgm_volume':0.4,'log_all_messages':True}, ensure_ascii=False, indent=2))"
          mkdir -p dist/songs dist/bgm
          echo "把点歌用的 mp3 放这里（也可在网页里上传）" > "dist/songs/说明.txt"
          echo "把背景音乐 mp3 放这里（也可在网页里上传）" > "dist/bgm/说明.txt"
          cp 使用说明.md dist/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GiftDJ-Windows
          path: dist
          retention-days: 30
